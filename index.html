<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sahara Flash</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<header>

    <div class="logo">
        <h1>Sahara <span>Flash</span></h1>
        <p>Score & Live Video</p>
    </div>

    <nav>
        <ul>
            <li onclick="showSection('live')">Live</li>
            <li onclick="showSection('fixtures')">Fixtures</li>
            <li onclick="showSection('standings')">Standings</li>
            <li onclick="showSection('news')">News</li>
        </ul>
    </nav>

    <div class="search">
        <input
            type="text"
            id="searchInput"
            placeholder="Search teams..."
            onkeyup="searchTeams()"
        >
    </div>

</header>

<main>

    <!-- LIVE -->

    <section id="live-section" class="section active">

        <h2 class="section-title">
            <i class="fas fa-broadcast-tower"></i>
            Live Matches
        </h2>

        <div id="live-matches" class="matches-grid"></div>

    </section>

    <!-- FIXTURES -->

    <section id="fixtures-section" class="section">

        <h2 class="section-title">
            Upcoming Fixtures
        </h2>

        <div id="fixtures" class="matches-grid"></div>

    </section>

    <!-- STANDINGS -->

    <section id="standings-section" class="section">

        <h2 class="section-title">
            League Standings
        </h2>

        <select
            id="league-select"
            onchange="loadStandings()"
        >
        </select>

        <table id="standings-table">

            <thead>

                <tr>
                    <th>Pos</th>
                    <th>Team</th>
                    <th>P</th>
                    <th>W</th>
                    <th>D</th>
                    <th>L</th>
                    <th>GF</th>
                    <th>GA</th>
                    <th>GD</th>
                    <th>Pts</th>
                </tr>

            </thead>

            <tbody id="standings-body"></tbody>

        </table>

    </section>

    <!-- NEWS -->

    <section id="news-section" class="section">

        <h2 class="section-title">
            Football News
        </h2>

        <div id="news-content">

            <p style="padding:20px;">
                Latest football news coming soon...
            </p>

        </div>

    </section>

</main>

<!-- MODAL -->

<div id="team-modal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeModal()">
            ×
        </span>

        <div id="modal-team-header"></div>

        <!-- TABS -->

        <div class="tabs">

            <button
                class="tab-btn active"
                onclick="switchTab(0)"
            >
                Live Video
            </button>

            <button
                class="tab-btn"
                onclick="switchTab(1)"
            >
                Lineup
            </button>

            <button
                class="tab-btn"
                onclick="switchTab(2)"
            >
                Stats
            </button>

            <button
                class="tab-btn"
                onclick="switchTab(3)"
            >
                Events
            </button>

            <button
                class="tab-btn"
                onclick="switchTab(4)"
            >
                Odds
            </button>

            <button
                class="tab-btn"
                onclick="switchTab(5)"
            >
                Preview
            </button>

        </div>

        <!-- TAB CONTENT -->

        <div id="tab-video" class="tab-content active">

            <iframe
                id="live-video"
                width="100%"
                height="500"
                frameborder="0"
                allowfullscreen
            ></iframe>

        </div>

        <div id="tab-lineup" class="tab-content">
            <div id="lineup-content"></div>
        </div>

        <div id="tab-stats" class="tab-content">
            <div id="stats-content" class="stats-grid"></div>
        </div>

        <div id="tab-events" class="tab-content">
            <div id="events-content"></div>
        </div>

        <div id="tab-odds" class="tab-content">
            <div id="odds-content"></div>
        </div>

        <div id="tab-preview" class="tab-content">
            <div id="preview-content"></div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
